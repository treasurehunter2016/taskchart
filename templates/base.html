<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <script>(function(){var t=localStorage.getItem('chore-chart-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>{% block title %}TaskChart{% endblock %}</title>
    <style>
        /* ── Theme: Dark ── */
        :root, [data-theme="dark"] {
            --bg:         #000;
            --bg2:        #1c1c1e;
            --bg3:        #2c2c2e;
            --bg4:        #3a3a3c;
            --text:       #fff;
            --text2:      rgba(235,235,245,.85);
            --text3:      #8e8e93;
            --accent:     #007AFF;
            --green:      #30d158;
            --red:        #ff453a;
            --red-bg-hi:  rgba(255, 69,  58,  0.25);
            --red-bg-lo:  rgba(255, 69,  58,  0.09);
            --red-border: rgba(255, 69,  58,  0.27);
            --yellow:     #ffd60a;
            --border:     #38383a;
            --tab-bg:     rgba(28,28,30,.94);
            --shadow:     rgba(0,0,0,.6);
            --input-bg:   #1c1c1e;
            --check-bg:   #30d158;
            --check-fg:   #fff;
            --check-border: #38383a;
        }
        /* ── Theme: Light Green (eye-friendly) ── */
        [data-theme="green"] {
            --bg:         #f2f7f2;
            --bg2:        #fff;
            --bg3:        #e4efe4;
            --bg4:        #cfe0cf;
            --text:       #1a2e1a;
            --text2:      #2c4630;
            --text3:      #5a7a5c;
            --accent:     #2d7d32;
            --green:      #2d7d32;
            --red:        #c62828;
            --red-bg-hi:  rgba(198, 40,  40,  0.22);
            --red-bg-lo:  rgba(198, 40,  40,  0.08);
            --red-border: rgba(198, 40,  40,  0.25);
            --yellow:     #e65100;
            --border:     #b8d4b8;
            --tab-bg:     rgba(242,247,242,.96);
            --shadow:     rgba(0,0,0,.12);
            --input-bg:   #edf5ed;
            /* Completion box — high-contrast in green mode */
            --check-bg:   #2d7d32;
            --check-fg:   #ffffff;
            --check-border: #2d7d32;  /* visible on light bg */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
            font-size: 19px; /* +3 from browser default 16px */
            min-height: 100vh;
            padding-bottom: calc(86px + env(safe-area-inset-bottom));
            overflow-x: hidden;
            transition: background .3s, color .3s;
        }

        /* ── Tab bar ── */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: calc(86px + env(safe-area-inset-bottom));
            background: var(--tab-bg);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border);
            display: flex; align-items: flex-start; padding-top: 8px;
            z-index: 900; transition: background .3s, border-color .3s;
        }
        .tab-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            gap: 3px; text-decoration: none; color: var(--text3);
            padding: 4px 0; transition: color .15s;
        }
        .tab-item.active { color: var(--accent); }
        .tab-icon  { font-size: 32px; line-height: 1; }
        .tab-label { font-size: 16px; font-weight: 600; letter-spacing: .2px; }

        /* ── Page header ── */
        .page-header {
            padding: 56px 20px 8px;
            display: flex; align-items: flex-end; justify-content: space-between;
        }
        .page-title    { font-size: 37px; font-weight: 700; letter-spacing: -.5px; } /* +3 */
        .header-action { color: var(--accent); font-size: 20px; text-decoration: none; padding: 4px 0; } /* +3 */

        /* ── Cards ── */
        .card {
            background: var(--bg2); border-radius: 14px;
            margin: 0 16px 16px; overflow: hidden;
            box-shadow: 0 1px 4px var(--shadow);
            transition: background .3s;
        }
        .list-row {
            display: flex; align-items: center; padding: 16px 16px;
            border-bottom: 1px solid var(--border); gap: 12px;
            transition: border-color .3s;
        }
        .list-row:last-child { border-bottom: none; }
        .list-row-info  { flex: 1; min-width: 0; }
        .list-row-title { font-size: 20px; font-weight: 500; }   /* +3 */
        .list-row-sub   { font-size: 16px; color: var(--text3); margin-top: 2px; } /* +3 */
        .list-row-right { color: var(--text3); font-size: 18px; display: flex; align-items: center; gap: 6px; } /* +3 */

        /* ── Section label ── */
        .section-label {
            font-size: 16px; font-weight: 600; color: var(--text3); /* +3 */
            text-transform: uppercase; letter-spacing: .5px;
            padding: 16px 20px 8px;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            border: none; border-radius: 12px; font-size: 20px; font-weight: 600; /* +3 */
            cursor: pointer; padding: 16px 20px; transition: opacity .15s; width: 100%;
        }
        .btn:active { opacity: .75; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-danger  { background: var(--red);    color: #fff; }
        .btn-ghost   { background: var(--bg3);    color: var(--text); }
        .btn-block   { display: flex; margin: 0 16px; width: calc(100% - 32px); }

        /* ── Avatar ── */
        .avatar {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; flex-shrink: 0; /* +3 */
        }
        .avatar-sm {
            width: 32px; height: 32px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 17px; /* +3 */
        }
        .avatar-overlap { margin-left: -8px; }
        .avatar-overlap:first-child { margin-left: 0; }

        /* ── Chore icon ── */
        .chore-icon {
            width: 48px; height: 48px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; flex-shrink: 0; background: var(--bg3); /* +3 */
        }

        /* ── Segmented control ── */
        .seg-ctrl {
            display: flex; background: var(--bg3); border-radius: 9px; padding: 2px;
        }
        .seg-btn {
            flex: 1; padding: 8px 4px; border: none; background: none; color: var(--text3);
            font-size: 16px; font-weight: 600; border-radius: 7px; cursor: pointer; /* +3 */
            transition: all .2s; text-align: center; text-decoration: none;
        }
        .seg-btn.active {
            background: var(--bg4); color: var(--text);
            box-shadow: 0 1px 3px var(--shadow);
        }

        /* ── Modal / sheet ── */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.5);
            z-index: 1000; display: none; align-items: flex-end;
        }
        .overlay.show { display: flex; }
        .sheet {
            background: var(--bg2); border-radius: 20px 20px 0 0;
            padding: 12px 20px 44px; width: 100%; max-height: 88vh; overflow-y: auto;
            animation: slideUp .28s ease;
        }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .sheet-handle { width: 36px; height: 4px; background: var(--bg4); border-radius: 2px; margin: 0 auto 16px; }
        .sheet-title  { font-size: 23px; font-weight: 700; margin-bottom: 20px; text-align: center; } /* +3 */

        /* ── Form ── */
        .form-group { margin-bottom: 20px; }
        .form-label {
            font-size: 16px; font-weight: 600; color: var(--text3); /* +3 */
            text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; display: block;
        }
        .form-input {
            background: var(--input-bg); border: 1.5px solid var(--border);
            border-radius: 10px; padding: 14px 14px;
            color: var(--text); font-size: 20px; width: 100%; /* +3 */
            -webkit-appearance: none; appearance: none;
            transition: border-color .2s, background .3s;
        }
        .form-input:focus { outline: none; border-color: var(--accent); }
        .form-input::placeholder { color: var(--text3); }
        select.form-input { cursor: pointer; }

        /* ── Completion checkbox — uses theme variables for green-mode contrast ── */
        .completion-box {
            width: 30px; height: 30px; border-radius: 8px;
            border: 2.5px solid var(--check-border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: all .2s;
            background: transparent;
        }
        .completion-box.done {
            background: var(--check-bg);
            border-color: var(--check-bg);
        }
        .completion-box.done::after {
            content: '✓'; color: var(--check-fg); font-size: 18px; font-weight: 800; /* +3 */
        }

        /* In green mode, unchecked box border is the accent so it's visible on light bg */
        [data-theme="green"] .completion-box { border-color: var(--accent); border-width: 2.5px; }

        /* ── Points badge ── */
        .pts-badge { font-size: 16px; color: var(--text3); font-weight: 500; white-space: nowrap; } /* +3 */

        /* ── Milestone badge (streak achievement) ── */
        .milestone-badge {
            display: inline-flex; align-items: center;
            font-size: 18px; margin-left: 3px;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,.3));
        }

        /* ── Streak badge ── */
        .streak-badge {
            display: inline-flex; align-items: center; gap: 3px;
            background: #ff6b0022; color: #ff6b00;
            border-radius: 12px; padding: 2px 9px;
            font-size: 15px; font-weight: 700; white-space: nowrap;
        }
        [data-theme="green"] .streak-badge { background: #2d7d3222; color: #2d7d32; }

        /* ── Toast ── */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
            background: var(--bg2); border: 1px solid var(--border);
            color: var(--text); padding: 12px 24px; border-radius: 22px;
            font-size: 17px; font-weight: 600; z-index: 2000; /* +3 */
            box-shadow: 0 4px 20px var(--shadow);
            transition: transform .3s ease; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ── Celebration burst ── */
        @keyframes burstPop {
            0%   { opacity:1; transform:translateY(-50%) scale(.5); }
            60%  { opacity:1; transform:translateY(-100%) scale(1.6); }
            100% { opacity:0; transform:translateY(-180%) scale(1); }
        }

        /* ── Empty state ── */
        .empty-state { text-align: center; padding: 52px 20px; color: var(--text3); }
        .empty-state-icon { font-size: 56px; margin-bottom: 12px; }
        .empty-state-text { font-size: 20px; font-weight: 500; } /* +3 */

        /* ── Utilities ── */
        .text-green    { color: var(--green); }
        .text-red      { color: var(--red); }
        .text-accent   { color: var(--accent); }
        .text-secondary{ color: var(--text3); }
        .fw-700        { font-weight: 700; }
        .strikethrough { text-decoration: line-through; opacity: .5; }
        a { color: inherit; text-decoration: none; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="toast" id="globalToast"></div>

    {% block content %}{% endblock %}

    <nav class="tab-bar">
        <a href="/" class="tab-item {% if active_tab=='household' %}active{% endif %}">
            <span class="tab-icon">🏠</span><span class="tab-label">Home</span>
        </a>
        <a href="/today" class="tab-item {% if active_tab=='today' %}active{% endif %}">
            <span class="tab-icon">📅</span><span class="tab-label">Today</span>
        </a>
        <a href="/tasks" class="tab-item {% if active_tab=='tasks' %}active{% endif %}">
            <span class="tab-icon">📋</span><span class="tab-label">Tasks</span>
        </a>
        <a href="/chart" class="tab-item {% if active_tab=='chart' %}active{% endif %}">
            <span class="tab-icon">📊</span><span class="tab-label">Chart</span>
        </a>
        <a href="/balances" class="tab-item {% if active_tab=='balances' %}active{% endif %}">
            <span class="tab-icon">🎁</span><span class="tab-label">Rewards</span>
        </a>
        <a href="/settings" class="tab-item {% if active_tab=='settings' %}active{% endif %}">
            <span class="tab-icon">⚙️</span><span class="tab-label">Settings</span>
        </a>
    </nav>

    <script>
    function showToast(msg, ms) {
        var t = document.getElementById('globalToast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(function(){ t.classList.remove('show'); }, ms||2200);
    }
    function setTheme(name) {
        document.documentElement.setAttribute('data-theme', name);
        localStorage.setItem('chore-chart-theme', name);
    }
    function currentTheme() {
        return document.documentElement.getAttribute('data-theme') || 'dark';
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
